<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syniox Hub | Access Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@400;700;900&display=swap');

        :root {
            --primary: #ff0000;
            --primary-glow: rgba(255, 0, 0, 0.6);
            --bg-black: #050505;
            --panel-bg: rgba(10, 10, 10, 0.9);
        }

        body {
            background-color: var(--bg-black);
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0; 
            min-height: 100vh;
            display: flex; 
            justify-content: center; 
            align-items: center;
            overflow-x: hidden;
            overflow-y: auto;
            background: radial-gradient(circle at center, #1a0000 0%, #050505 100%);
        }

        .stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: transparent url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/123163/stars.png') repeat;
            z-index: -2; opacity: 0.5; animation: moveStars 150s linear infinite;
        }

        @keyframes moveStars { from { background-position: 0 0; } to { background-position: 10000px 5000px; } }

        .mountain-overlay {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 35vh;
            background: url('https://i.imgur.com/vH95tK6.png') repeat-x;
            background-size: cover; z-index: -1; opacity: 0.15; filter: brightness(0.5) sepia(1) saturate(10) hue-rotate(-50deg);
        }

        .container {
            width: 100%;
            max-width: 440px;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .main-card {
            background: var(--panel-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 0, 0, 0.2);
            border-radius: 40px;
            padding: 50px 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8);
            position: relative;
            width: 100%;
            box-sizing: border-box;
        }

        .card-top-line {
            position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 100px; height: 4px; background: var(--primary);
            box-shadow: 0 0 20px var(--primary); border-radius: 0 0 10px 10px;
        }

        .header { text-align: center; margin-bottom: 40px; }

        .logo-container {
            width: 90px; height: 90px; margin: 0 auto 20px; position: relative;
        }
        .logo-container::after {
            content: ''; position: absolute; inset: -6px;
            border: 2px solid var(--primary); border-radius: 25px;
            animation: pulseLogo 2s infinite;
        }
        .logo-container img {
            width: 100%; height: 100%; border-radius: 25px; 
            border: 2px solid var(--primary); object-fit: cover;
            position: relative; z-index: 2;
        }

        @keyframes pulseLogo {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.25); opacity: 0; }
        }

        .shimmer-text {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.6rem; font-weight: 700; letter-spacing: 5px;
            background: linear-gradient(90deg, #ffffff, #ff0000, #ffffff);
            background-size: 200% auto;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: textShimmer 3s linear infinite;
        }

        @keyframes textShimmer { to { background-position: 200% center; } }

        .tagline { font-size: 0.65rem; color: #666; letter-spacing: 3px; text-transform: uppercase; margin-top: 10px; }

        .step {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px; padding: 18px; margin-bottom: 15px;
            display: flex; align-items: center; gap: 15px;
            transition: 0.3s ease;
        }

        .step:hover {
            background: rgba(255, 0, 0, 0.07);
            border-color: rgba(255, 0, 0, 0.3);
            transform: translateX(5px);
        }

        .step-num {
            background: linear-gradient(135deg, #ff0000, #800000);
            min-width: 38px; height: 38px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1rem;
            box-shadow: 0 4px 12px rgba(255, 0, 0, 0.4);
        }

        .step-content b { display: block; font-size: 0.95rem; color: #fff; }
        .step-content p { margin: 3px 0 0; font-size: 0.75rem; color: #888; line-height: 1.4; }

        .glow-btn {
            background: #fff; color: #000;
            text-decoration: none; padding: 20px; border-radius: 20px;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            font-weight: 900; font-size: 0.9rem; margin-top: 30px;
            text-transform: uppercase; letter-spacing: 2px;
            transition: 0.3s;
        }

        .glow-btn:hover {
            background: var(--primary); color: #fff;
            box-shadow: 0 0 35px var(--primary-glow);
            transform: translateY(-3px);
        }

        .footer-info {
            display: flex; justify-content: space-between;
            margin-top: 30px; font-size: 0.6rem; color: #444;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="stars"></div>
<div class="mountain-overlay"></div>

<div class="container">
    <div class="main-card">
        <div class="card-top-line"></div>
        
        <div class="header">
            <div class="logo-container">
                <img src="https://i.hizliresim.com/r3xgxvw.gif" alt="Syniox Logo">
            </div>
            <h1 class="shimmer-text">SYNIOX HUB</h1>
            <div class="tagline">BEYOND THE LIMITS</div>
        </div>

        <div class="step">
            <div class="step-num">1</div>
            <div class="step-content">
                <b>Join Server</b>
                <p>Access our community to unlock the hub.</p>
            </div>
        </div>

        <div class="step">
            <div class="step-num">2</div>
            <div class="step-content">
                <b>Get Your Key</b>
                <p>Find the permanent key in the #key channel.</p>
            </div>
        </div>

        <div class="step">
            <div class="step-num">3</div>
            <div class="step-content">
                <b>Start Script</b>
                <p>Paste the key into the loader and enjoy.</p>
            </div>
        </div>

        <a href="https://discord.gg/DbAU5Z6HPd" target="_blank" class="glow-btn">
            <i class="fa-brands fa-discord"></i> GO TO DISCORD SERVER
        </a>

        <div class="footer-info">
            <span>SECURE SYSTEM</span>
            <span>SYNIOX HUB © 2026</span>
        </div>
    </div>
</div>

</body>
</html>
