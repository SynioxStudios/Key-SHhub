<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syniox Hub | Secure Access</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff0000;
            --primary-glow: rgba(255, 0, 0, 0.5);
            --bg-deep: #050505;
            --card-bg: rgba(15, 15, 15, 0.9);
            --border-light: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg-deep);
            color: #fff;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            margin: 0; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            /* Arka plan animasyonu */
            background: radial-gradient(circle at 50% 50%, #150000 0%, #050505 100%);
        }

        /* Arka plandaki hareketli çizgiler */
        .bg-lines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(255, 0, 0, 0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            animation: moveBg 20s linear infinite;
        }

        @keyframes moveBg { from { background-position: 0 0; } to { background-position: 50px 50px; } }

        .container {
            width: 100%; max-width: 420px;
            position: relative; padding: 20px;
        }

        /* Ana Panel */
        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-light);
            border-radius: 35px;
            padding: 45px 30px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 1), 0 0 20px rgba(255, 0, 0, 0.1);
            position: relative;
            z-index: 1;
        }

        /* Köşe süsleri */
        .glass-panel::before {
            content: ''; position: absolute; top: -2px; left: 50%; transform: translateX(-50%);
            width: 80px; height: 4px; background: var(--primary);
            box-shadow: 0 0 15px var(--primary); border-radius: 10px;
        }

        .header { text-align: center; margin-bottom: 40px; }
        
        .logo-aura {
            position: relative; width: 90px; height: 90px; margin: 0 auto 25px;
        }
        .logo-aura::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 25px; border: 2px solid var(--primary);
            animation: pulse 2s infinite;
        }
        .logo-aura img {
            width: 100%; height: 100%; border-radius: 25px; object-fit: cover;
            position: relative; z-index: 2;
        }

        @keyframes pulse { 
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.3); opacity: 0; }
        }

        h1 { font-size: 1.8rem; margin: 0; letter-spacing: 5px; font-weight: 900; background: linear-gradient(to bottom, #fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tagline { font-size: 0.7rem; color: var(--primary); letter-spacing: 3px; font-weight: bold; margin-top: 10px; opacity: 0.8; }

        /* Modern Adım Kartları */
        .step-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex; align-items: center; gap: 20px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .step-box:hover {
            background: rgba(255, 0, 0, 0.05);
            border-color: rgba(255, 0, 0, 0.3);
            transform: scale(1.02);
        }

        .step-icon {
            font-size: 1.4rem; color: #fff;
            text-shadow: 0 0 10px var(--primary);
        }

        .step-info b { font-size: 1rem; display: block; margin-bottom: 4px; color: #fff; }
        .step-info p { margin: 0; font-size: 0.8rem; color: #666; line-height: 1.4; }
        .channel-id { color: var(--primary); font-family: monospace; font-weight: bold; }

        /* Neon Buton */
        .discord-btn {
            background: #fff;
            color: #000;
            text-decoration: none;
            display: flex; align-items: center; justify-content: center; gap: 15px;
            padding: 20px; border-radius: 18px;
            font-weight: 900; font-size: 0.9rem;
            margin-top: 35px;
            transition: 0.3s;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        }

        .discord-btn:hover {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 0 40px var(--primary-glow);
            transform: translateY(-5px);
        }

        .footer {
            margin-top: 30px; text-align: center; font-size: 0.6rem; 
            color: #444; letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div class="bg-lines"></div>

<div class="container">
    <div class="glass-panel">
        <div class="header">
            <div class="logo-aura">
                <img src="https://i.hizliresim.com/r3xgxvw.gif" alt="Syniox Logo">
            </div>
            <h1>SYNIOX</h1>
            <div class="tagline">AUTHORIZATION SYSTEM</div>
        </div>

        <div class="step-box">
            <div class="step-icon"><i class="fa-brands fa-discord"></i></div>
            <div class="step-info">
                <b>Community Entry</b>
                <p>Join the server to initialize connection.</p>
            </div>
        </div>

        <div class="step-box">
            <div class="step-icon"><i class="fa-solid fa-code-branch"></i></div>
            <div class="step-info">
                <b>Key Directory</b>
                <p>Access the <span class="channel-id">#key</span> terminal.</p>
            </div>
        </div>

        <div class="step-box">
            <div class="step-icon"><i class="fa-solid fa-fingerprint"></i></div>
            <div class="step-info">
                <b>Verification</b>
                <p>Copy the static key into the hub.</p>
            </div>
        </div>

        <a href="https://discord.gg/DbAU5Z6HPd" target="_blank" class="discord-btn">
            GO TO DISCORD SERVER <i class="fa-solid fa-chevron-right"></i>
        </a>

        <div class="footer">SYSTEM STATUS: OPERATIONAL v2.6</div>
    </div>
</div>

</body>
</html>
