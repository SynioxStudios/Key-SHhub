<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syniox Hub | Key System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #080808;
            --panel-bg: #111111;
            --accent: #ff0000;
            --border-color: #222222;
            --text-main: #ffffff;
            --text-dim: #888888;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px;
        }

        /* Ana Panel - İçeriği saran ana kutu */
        .main-card {
            width: 100%; max-width: 400px;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 32px;
            padding: 40px 25px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            position: relative;
            overflow: hidden;
        }

        /* Üst tarafa ince bir neon çizgi efekti */
        .main-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        .header { text-align: center; margin-bottom: 35px; }
        
        .logo-box {
            width: 85px; height: 85px; margin: 0 auto 20px;
            border: 2px solid var(--accent); border-radius: 20px;
            overflow: hidden; box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
        }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }

        h1 { font-size: 1.6rem; margin: 0; letter-spacing: 2px; font-weight: 800; text-transform: uppercase; }
        .tagline { color: var(--text-dim); font-size: 0.75rem; margin-top: 5px; text-transform: uppercase; letter-spacing: 1px; }

        /* Yazıların etrafını kaplayan adım kutuları */
        .instruction-step {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex; align-items: center; gap: 15px;
            transition: 0.3s;
        }

        .instruction-step:hover {
            border-color: rgba(255, 0, 0, 0.3);
            background: rgba(255, 255, 255, 0.04);
        }

        .icon-square {
            min-width: 40px; height: 40px;
            background: rgba(255, 0, 0, 0.1);
            color: var(--accent);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem;
        }

        .step-info b { display: block; font-size: 0.9rem; margin-bottom: 2px; }
        .step-info p { margin: 0; font-size: 0.75rem; color: var(--text-dim); line-height: 1.3; }

        .channel { color: var(--accent); font-weight: bold; }

        /* Buton alanı */
        .btn-wrapper { margin-top: 30px; }
        
        .discord-btn {
            background: var(--accent);
            color: white; text-decoration: none;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            padding: 18px; border-radius: 15px;
            font-weight: 700; font-size: 0.9rem;
            transition: 0.3s;
            box-shadow: 0 8px 15px rgba(255, 0, 0, 0.2);
        }

        .discord-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(255, 0, 0, 0.4);
            filter: brightness(1.1);
        }

        .footer {
            margin-top: 25px; text-align: center;
            font-size: 0.6rem; color: #444;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="main-card">
    <div class="header">
        <div class="logo-box">
            <img src="https://i.hizliresim.com/r3xgxvw.gif" alt="Syniox Logo">
        </div>
        <h1>SYNIOX HUB</h1>
        <div class="tagline">Authorization Required</div>
    </div>

    <div class="instruction-step">
        <div class="icon-square"><i class="fa-brands fa-discord"></i></div>
        <div class="step-info">
            <b>Access Server</b>
            <p>Join our official Discord to begin.</p>
        </div>
    </div>

    <div class="instruction-step">
        <div class="icon-square"><i class="fa-solid fa-hashtag"></i></div>
        <div class="step-info">
            <b>Find Channel</b>
            <p>Locate the <span class="channel">#key</span> directory.</p>
        </div>
    </div>

    <div class="instruction-step">
        <div class="icon-square"><i class="fa-solid fa-terminal"></i></div>
        <div class="step-info">
            <b>Finalize</b>
            <p>Copy the static key into your loader.</p>
        </div>
    </div>

    <div class="btn-wrapper">
        <a href="https://discord.gg/DbAU5Z6HPd" target="_blank" class="discord-btn">
            GO TO DISCORD SERVER <i class="fa-solid fa-arrow-right"></i>
        </a>
    </div>

    <div class="footer">SYNIOX SYSTEMS &copy; 2026</div>
</div>

</body>
</html>
