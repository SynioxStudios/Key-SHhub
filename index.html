<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syniox Hub | Key System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #050505;
            --accent: #ff0000;
            --text-primary: #ffffff;
            --text-secondary: #777777;
            --panel: #0f0f0f;
        }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }

        .main-container {
            width: 100%; max-width: 380px;
            padding: 40px 25px;
            text-align: center;
        }

        .brand-logo {
            width: 90px; height: 90px;
            margin: 0 auto 20px;
            border: 2px solid var(--accent);
            border-radius: 22px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.15);
        }
        .brand-logo img { width: 100%; height: 100%; object-fit: cover; }

        h1 { font-size: 1.8rem; margin: 5px 0; letter-spacing: 3px; font-weight: 800; }
        .tagline { color: var(--text-secondary); font-size: 0.75rem; margin-bottom: 45px; letter-spacing: 1px; }

        /* Step List */
        .instruction-list { text-align: left; margin-bottom: 40px; }
        
        .step-item {
            display: flex; align-items: flex-start; gap: 18px;
            margin-bottom: 30px;
        }

        .step-icon-box {
            background: rgba(255, 0, 0, 0.05);
            color: var(--accent);
            min-width: 45px; height: 45px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
            border: 1px solid rgba(255, 0, 0, 0.1);
        }

        .step-info b { display: block; font-size: 0.95rem; margin-bottom: 3px; }
        .step-info p { margin: 0; font-size: 0.8rem; color: var(--text-secondary); line-height: 1.4; }

        .channel-highlight {
            color: var(--accent);
            font-family: 'Consolas', monospace;
            background: rgba(255, 0, 0, 0.08);
            padding: 2px 5px; border-radius: 4px;
        }

        /* The Button */
        .discord-btn {
            background: var(--accent);
            color: #fff; text-decoration: none;
            padding: 20px; border-radius: 15px;
            width: 100%; display: flex; align-items: center;
            justify-content: center; gap: 12px;
            font-weight: 700; font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-sizing: border-box;
            box-shadow: 0 10px 20px rgba(255, 0, 0, 0.2);
        }

        .discord-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 30px rgba(255, 0, 0, 0.4);
            filter: brightness(1.1);
        }

        .copyright {
            margin-top: 40px; font-size: 0.65rem; color: #333;
            text-transform: uppercase; letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="brand-logo">
        <img src="https://i.hizliresim.com/r3xgxvw.gif" alt="Syniox Logo">
    </div>

    <h1>SYNIOX HUB</h1>
    <div class="tagline">KEY RETRIEVAL SYSTEM</div>

    <div class="instruction-list">
        <div class="step-item">
            <div class="step-icon-box"><i class="fa-brands fa-discord"></i></div>
            <div class="step-info">
                <b>Join Discord</b>
                <p>Join our community server to unlock the hub features.</p>
            </div>
        </div>

        <div class="step-item">
            <div class="step-icon-box"><i class="fa-solid fa-hashtag"></i></div>
            <div class="step-info">
                <b>Locate Channel</b>
                <p>Find the <span class="channel-highlight">#key</span> channel in the server sidebar.</p>
            </div>
        </div>

        <div class="step-item">
            <div class="step-icon-box"><i class="fa-solid fa-key"></i></div>
            <div class="step-info">
                <b>Get Your Key</b>
                <p>Copy the permanent key and paste it into the application.</p>
            </div>
        </div>
    </div>

    <a href="https://discord.gg/DbAU5Z6HPd" target="_blank" class="discord-btn">
        GO TO DISCORD SERVER <i class="fa-solid fa-arrow-right"></i>
    </a>

    <div class="copyright">Syniox Hub © 2026</div>
</div>

</body>
</html>
