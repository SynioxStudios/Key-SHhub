<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syniox Hub | Secure Access</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            /* Senin Ana Renklerin: Kırmızı ve Siyah */
            --bg-color: #000000;
            --panel-bg: #111111;
            --accent: #ff0000;
            --text-main: #ffffff;
            --text-dim: #888888;
            --border-color: #222222;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px;
            /* Arka plan derinlik efekti (Görseldeki gibi) */
            background-image: 
                radial-gradient(circle at center, #1a0000 0%, #000000 70%),
                linear-gradient(rgba(255, 0, 0, 0.02) 1px, transparent 1px);
            background-size: cover, 30px 30px;
        }

        .main-panel {
            width: 100%; max-width: 400px;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 40px 25px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 1), 0 0 15px rgba(255, 0, 0, 0.05);
            position: relative;
            overflow: hidden;
        }

        /* Başlık Bölümü */
        .header { text-align: center; margin-bottom: 35px; }
        
        .logo-wrap {
            width: 80px; height: 80px; margin: 0 auto 15px;
            border: 2px solid var(--accent); border-radius: 20px;
            overflow: hidden; box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
        }
        .logo-wrap img { width: 100%; height: 100%; object-fit: cover; }

        /* --- BURASI İSTEDİĞİN RENK DEĞİŞTİREN YAZI --- */
        .color-shift {
            font-size: 1.7rem; margin: 0; 
            letter-spacing: 4px; font-weight: 900; 
            text-transform: uppercase;
            /* Beyazdan Kırmızıya Renk Değişimi */
            background: linear-gradient(90deg, #ffffff, #ff0000, #ffffff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shift 3s ease-in-out infinite;
        }

        @keyframes shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        /* ------------------------------------------- */

        .tagline { color: var(--text-dim); font-size: 0.75rem; margin-top: 5px; text-transform: uppercase; letter-spacing: 1px; }

        /* Videodaki Adımlar (Turuncu numara kutulu yapı) */
        .instruction-step {
            display: flex; align-items: center; gap: 15px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 15px; margin-bottom: 15px;
            transition: 0.3s;
        }

        .instruction-step:hover {
            border-color: rgba(255, 0, 0, 0.3);
            background: rgba(255, 255, 255, 0.04);
        }

        /* Numara Kutusu (Kırmızı ve Kopyalanmış gibi parlıyor) */
        .step-num {
            min-width: 35px; height: 35px;
            background: var(--accent);
            color: white; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1rem;
            box-shadow: 0 4px 10px rgba(255, 0, 0, 0.3);
        }

        .step-info b { display: block; font-size: 0.9rem; margin-bottom: 2px; color: var(--text-main); }
        .step-info p { margin: 0; font-size: 0.75rem; color: var(--text-dim); line-height: 1.3; }

        .channel { color: var(--accent); font-weight: bold; font-family: monospace; }

        /* Buton */
        .btn-wrapper { margin-top: 30px; }
        
        .discord-btn {
            background: var(--accent);
            color: white; text-decoration: none;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            padding: 18px; border-radius: 15px;
            font-weight: 700; font-size: 0.9rem;
            transition: 0.3s;
            box-shadow: 0 8px 15px rgba(255, 0, 0, 0.2);
        }

        .discord-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(255, 0, 0, 0.4);
            filter: brightness(1.1);
        }

        .footer {
            margin-top: 25px; text-align: center;
            font-size: 0.6rem; color: #444;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="main-panel">
    <div class="header">
        <div class="logo-wrap">
            <img src="https://i.hizliresim.com/r3xgxvw.gif" alt="Syniox Logo">
        </div>
        <h1 class="color-shift">SYNIOX HUB</h1>
        <div class="tagline">Static Key retrieval</div>
    </div>

    <div class="instruction-step">
        <div class="step-num">1</div>
        <div class="step-info">
            <b>Join Discord Server</b>
            <p>Join the community server to access the key.</p>
        </div>
    </div>

    <div class="instruction-step">
        <div class="step-num">2</div>
        <div class="step-info">
            <b>Find Channel</b>
            <p>Look for the <span class="channel">#key</span> directory.</p>
        </div>
    </div>

    <div class="instruction-step">
        <div class="step-num">3</div>
        <div class="step-info">
            <b>Finalize</b>
            <p>Copy the static key and paste it into the hub.</p>
        </div>
    </div>

    <div class="btn-wrapper">
        <a href="https://discord.gg/DbAU5Z6HPd" target="_blank" class="discord-btn">
            GO TO DISCORD SERVER <i class="fa-solid fa-chevron-right"></i>
        </a>
    </div>

    <div class="footer">SYSTEMS &copy; 2026</div>
</div>

</body>
</html>
